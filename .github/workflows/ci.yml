name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Go Prism Report
        if: github.event_name == 'pull_request'
        uses: ./
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          sticky-comment: "true"
          github-token: ${{ github.token }}

      - name: Go Prism Smoke
        if: github.event_name != 'pull_request'
        uses: ./
        with:
          base: HEAD
          head: HEAD
          sticky-comment: "false"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
