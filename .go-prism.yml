module: github.com/Athena900/go-prism

checks:
  gomod:
    enabled: true
  api:
    enabled: false
  vuln:
    enabled: false
  downstream:
    enabled: false
    modules:
      # Local downstream canary example:
      # - name: example-consumer
      #   path: ../example-consumer
      #   command: go test ./...
      #
      # Remote downstream canary example:
      # - name: public-consumer
      #   repo: https://github.com/example/consumer.git
      #   ref: main
      #   subdir: .
      #   command: go test ./...

policy:
  fail_on:
    gomod_parse_error: true
    new_replace_directive: false
